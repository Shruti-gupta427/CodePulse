version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: ai_review_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_review_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: